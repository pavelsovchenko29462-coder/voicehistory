<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{background:#141820;color:#d8dce8;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden;font-size:16px;line-height:1.6;}

.cat-section{padding:0 20px 30px;max-width:1100px;margin:0 auto;}
.cat-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#c8ccd8;margin-bottom:14px;padding-left:4px;display:flex;align-items:center;gap:10px;}

.typing{display:flex;gap:4px;padding:9px 13px;background:rgba(28,34,48,.9);border-radius:6px;border:1px solid rgba(160,180,220,.08);}

.error-bar{padding:6px 20px;color:#e07070;font-size:13px;flex-shrink:0;}
.input-area{padding:10px 16px;border-top:1px solid rgba(160,180,220,.1);background:rgba(20,24,32,.92);display:flex;gap:8px;flex-shrink:0;}

.send-btn{width:42px;height:42px;background:linear-gradient(135deg,#4a70b8,#2a4a8f);border:none;border-radius:6px;cursor:pointer;font-size:16px;flex-shrink:0;box-shadow:0 0 12px rgba(60,90,160,.2);transition:all .2s;}

</style>
</head>

let currentPerson = null;
let history = [];
let isLoading = false;
let activeCategory = 'all';
 
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const starsArr = Array.from({length:100},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+.3,o:Math.random()*.4+.05,d:Math.random()*2-1}));
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  starsArr.forEach(s=>{
    s.o+=s.d*0.003;
    if(s.o>0.45||s.o<0.03)s.d*=-1;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,230,${s.o})`;ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
 
function getAvatarStyle(color){
  return `background:linear-gradient(135deg,${color},${color}88);box-shadow:0 2px 12px ${color}40`;
}
 
function renderCategoryNav(){
  document.getElementById('categoryNav').innerHTML =
    `<button class="cat-btn ${activeCategory==='all'?'active':''}" onclick="filterCategory('all')">Все</button>` +
    CATEGORIES.map(c=>`<button class="cat-btn ${activeCategory===c.id?'active':''}" onclick="filterCategory('${c.id}')">${c.icon} ${c.name}</button>`).join('');
}
 
function filterCategory(catId){
  activeCategory = catId;
  renderCategoryNav();
  renderSections();
}
 
function renderSections(){
  const container = document.getElementById('personSections');
  const cats = activeCategory === 'all' ? CATEGORIES : CATEGORIES.filter(c=>c.id===activeCategory);
  container.innerHTML = cats.map(cat=>{
    const persons = PERSONS.filter(p=>p.cat===cat.id);
    if(!persons.length) return '';
    return `<div class="cat-section">
      <div class="cat-title"><span class="cat-title-icon">${cat.icon}</span>${cat.name}<span class="cat-title-line"></span></div>
      <div class="cat-grid">${persons.map((p,i)=>`
        <div class="card" onclick="openChat('${p.id}')" style="animation-delay:${i*.04}s">
          <div class="card-avatar" style="${getAvatarStyle(p.color)}">${p.initials}</div>
          <span class="card-tag" style="background:${p.color}20;color:${p.color};border:1px solid ${p.color}40">${p.tag}</span>
          <div class="card-name">${p.name}</div>
          <div class="card-era">${p.era}</div>
          <div class="card-link">Начать разговор →</div>
        </div>`).join('')}</div></div>`;
  }).join('');
}
 
renderCategoryNav();
renderSections();
 
function showHome(){
  document.getElementById('chat').style.display='none';
  document.getElementById('home').style.display='block';
}
 
function openChat(id){
  currentPerson = PERSONS.find(p=>p.id===id);
  history=[];
  document.getElementById('home').style.display='none';
  document.getElementById('chat').style.display='flex';
  const ava = document.getElementById('chatAvatar');
  ava.textContent = currentPerson.initials;
  ava.style.cssText = getAvatarStyle(currentPerson.color);
  document.getElementById('chatName').textContent=currentPerson.name;
  document.getElementById('chatEra').textContent=currentPerson.era;
  document.getElementById('chatInput').placeholder=`Задай вопрос ${currentPerson.name}...`;
  renderMessages();
}
 
function renderMessages(){
  const container = document.getElementById('messages');
  if(!history.length){
    container.innerHTML=`<div style="text-align:center;color:#6a7488;font-size:15px;font-style:italic;margin-bottom:14px">Начни с вопроса или выбери тему:</div>
      <div class="quick-prompts">${currentPerson.prompts.map(q=>`<button class="quick-btn" onclick="sendQuick('${q}')">${q}</button>`).join('')}</div>`;
    return;
  }
  container.innerHTML = history.map(m=>`
    <div class="msg ${m.role==='user'?'user':'bot'}">
      <div class="msg-ava" style="${m.role==='user'?'':`${getAvatarStyle(currentPerson.color)};font-size:12px`}">${m.role==='user'?'Вы':currentPerson.initials}</div>
      <div class="msg-wrap">
        <div class="msg-name">${m.role==='user'?'Вы':currentPerson.name}</div>
        <div class="msg-bubble" ${m.role==='bot'?`style="border-left:3px solid ${currentPerson.color}"`:''}>${m.content}</div>
      </div>
    </div>`).join('');
  container.scrollTop=container.scrollHeight;
}
 
function showTyping(){
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id='typing';div.className='msg bot';
  div.innerHTML=`<div class="msg-ava" style="${getAvatarStyle(currentPerson.color)};font-size:12px">${currentPerson.initials}</div><div class="msg-wrap"><div class="msg-name">${currentPerson.name}</div><div class="typing"><div class="dot" style="background:${currentPerson.color}"></div><div class="dot" style="background:${currentPerson.color};animation-delay:.2s"></div><div class="dot" style="background:${currentPerson.color};animation-delay:.4s"></div></div></div>`;
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
}
 
function sendQuick(q){document.getElementById('chatInput').value=q;sendMessage();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
 
async function sendMessage(){
  if(isLoading||!currentPerson)return;
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg)return;
  input.value='';input.style.height='auto';
  document.getElementById('errorBar').style.display='none';
  history.push({role:'user',content:msg});
  renderMessages();showTyping();
  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  try{
    const res = await fetch("https://voicehistory-api.pavelsovchenko29462.workers.dev",{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'anthropic/claude-sonnet-4-5',
        messages:[
          {role:'system',content:currentPerson.system},
          ...history.map(m=>({role:m.role==='bot'?'assistant':m.role,content:m.content}))
        ]
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const reply=data.choices?.[0]?.message?.content||'...';
    history.push({role:'bot',content:reply});
  }catch(e){
    history.push({role:'bot',content:'⚠ Ошибка соединения. Попробуй ещё раз.'});
    document.getElementById('errorBar').textContent='Ошибка: '+e.message;
    document.getElementById('errorBar').style.display='block';
  }finally{
    isLoading=false;
    document.getElementById('sendBtn').disabled=false;
    const t=document.getElementById('typing');if(t)t.remove();
    renderMessages();
  }
}
</script>
