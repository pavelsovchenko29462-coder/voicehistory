<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Голоса Истории</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Playfair+Display:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060914;color:#c8d8f0;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(91,143,247,.2);border-radius:2px}
 
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.nebula{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;min-height:100vh;}
 
nav{padding:14px 24px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(120,160,255,.08);backdrop-filter:blur(16px);background:rgba(6,9,20,.85);position:sticky;top:0;z-index:10;}
.nav-logo{display:flex;align-items:center;gap:12px;cursor:pointer;}
.nav-logo svg{width:28px;height:28px;}
.nav-logo-text{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#e8d5b7 0%,#f0e6d3 30%,#c8a870 60%,#e8d5b7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;}
 
#home{display:none;}
.hero{padding:50px 24px 20px;text-align:center;max-width:700px;margin:0 auto;animation:fadeUp .7s ease;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,52px);font-weight:900;line-height:1.15;margin-bottom:18px;background:linear-gradient(135deg,#fff 0%,#a8c8ff 40%,#5b8ff7 70%,#c8a8ff 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradShift 6s ease infinite;}
.hero p{font-size:16px;color:#7a90b8;line-height:1.8;font-style:italic;margin-bottom:10px;}
.hero-note{font-size:12px;color:#3a4a68;margin-bottom:30px;}
 
.category-nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 20px 24px;max-width:960px;margin:0 auto;}
.cat-btn{background:rgba(10,18,40,.7);border:1px solid rgba(120,160,255,.15);border-radius:20px;padding:7px 16px;color:#7a90b8;font-size:14px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-weight:600;transition:all .25s;letter-spacing:.5px;}
.cat-btn:hover,.cat-btn.active{background:rgba(91,143,247,.12);border-color:rgba(91,143,247,.4);color:#a8c8ff;}
 
.cat-section{padding:0 20px 30px;max-width:1100px;margin:0 auto;}
.cat-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#c8d8f0;margin-bottom:14px;padding-left:4px;display:flex;align-items:center;gap:10px;}
.cat-title-icon{font-size:18px;}
.cat-title-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(120,160,255,.2),transparent);}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:10px;}
 
.card{background:rgba(10,18,40,.85);border:1px solid rgba(120,160,255,.12);border-radius:10px;padding:16px;cursor:pointer;backdrop-filter:blur(8px);transition:all .25s ease;animation:fadeUp .5s ease both;text-align:center;}
.card:hover{transform:translateY(-4px);border-color:rgba(160,200,255,.4);box-shadow:0 8px 32px rgba(91,143,247,.15);}
.card-portrait{width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;border:2px solid rgba(120,160,255,.2);box-shadow:0 0 16px rgba(91,143,247,.12);transition:all .3s ease;background:rgba(20,30,60,.5);}
.card:hover .card-portrait{border-color:rgba(160,200,255,.5);box-shadow:0 0 24px rgba(91,143,247,.25);transform:scale(1.05);}
.card-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;letter-spacing:.5px;margin-bottom:6px;}
.card-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#c8d8f0;margin-bottom:2px;}
.card-era{font-size:11px;color:#3a4a68;margin-bottom:8px;}
.card-link{font-size:12px;color:#5b8ff7;border-top:1px solid rgba(120,160,255,.08);padding-top:7px;}
 
#chat{display:none;height:100vh;flex-direction:column;}
.chat-header{padding:10px 20px;border-bottom:1px solid rgba(120,160,255,.1);display:flex;align-items:center;gap:12px;background:rgba(6,9,20,.85);flex-shrink:0;backdrop-filter:blur(10px);}
.back-btn{background:transparent;border:1px solid rgba(120,160,255,.2);border-radius:3px;padding:5px 12px;color:#5b8ff7;font-size:13px;cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .2s;}
.back-btn:hover{background:rgba(91,143,247,.08);}
.chat-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(10,18,40,.9);overflow:hidden;flex-shrink:0;}
.chat-avatar img{width:100%;height:100%;object-fit:cover;}
.chat-name{font-family:'Playfair Display',serif;font-size:16px;color:#c8d8f0;}
.chat-era{font-size:10px;color:#3a4a68;font-style:italic;}
.chat-lock{margin-left:auto;font-size:10px;color:#3a4a68;font-style:italic;}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.quick-prompts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px;}
.quick-btn{background:rgba(91,143,247,.06);border:1px solid rgba(91,143,247,.2);border-radius:20px;padding:6px 14px;color:#7a90b8;font-size:14px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-style:italic;transition:all .2s;}
.quick-btn:hover{background:rgba(91,143,247,.12);color:#a8c8ff;}
.msg{display:flex;gap:8px;animation:fadeUp .3s ease;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(120,160,255,.2);background:rgba(10,18,40,.9);overflow:hidden;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg.user .msg-avatar{background:rgba(91,143,247,.08);border-color:rgba(91,143,247,.25);font-size:10px;color:#5b8ff7;font-weight:bold;}
.msg-wrap{max-width:74%;}
.msg-name{font-size:10px;color:#3a4a68;margin-bottom:3px;}
.msg.user .msg-name{text-align:right;}
.msg-bubble{padding:10px 14px;line-height:1.7;font-size:15px;border-radius:3px;}
.msg.bot .msg-bubble{background:rgba(10,18,40,.9);border:1px solid rgba(91,143,247,.08);font-style:italic;color:#c8d8f0;}
.msg.user .msg-bubble{background:rgba(91,143,247,.06);border:1px solid rgba(91,143,247,.15);color:#7a90b8;}
.typing{display:flex;gap:4px;padding:9px 13px;background:rgba(10,18,40,.9);border-radius:3px;border:1px solid rgba(91,143,247,.08);}
.dot{width:5px;height:5px;border-radius:50%;animation:blink 1.2s ease-in-out infinite;}
.error-bar{padding:6px 20px;color:#f07070;font-size:12px;flex-shrink:0;}
.input-area{padding:10px 16px;border-top:1px solid rgba(120,160,255,.1);background:rgba(6,9,20,.85);display:flex;gap:8px;flex-shrink:0;}
.chat-input{flex:1;background:rgba(10,18,40,.95);border:1px solid rgba(120,160,255,.15);border-radius:3px;padding:9px 13px;color:#c8d8f0;font-family:'Cormorant Garamond',serif;font-size:15px;resize:none;outline:none;line-height:1.5;transition:border-color .2s;}
.chat-input:focus{border-color:rgba(91,143,247,.5);}
.chat-input::placeholder{color:rgba(120,150,200,.35);font-style:italic;}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,#3a6fd8,#1a3a9f);border:none;border-radius:3px;cursor:pointer;font-size:16px;flex-shrink:0;box-shadow:0 0 14px rgba(91,143,247,.25);transition:all .2s;}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(91,143,247,.35);}
.send-btn:disabled{background:rgba(91,143,247,.1);cursor:not-allowed;transform:none;box-shadow:none;}
 
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes blink{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
</style>
</head>
<body>
 
<canvas id="stars"></canvas>
<div class="nebula" style="top:-10%;left:-5%;width:500px;height:500px;background:radial-gradient(circle,rgba(40,80,180,.15) 0%,transparent 70%);"></div>
<div class="nebula" style="bottom:10%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(80,40,160,.1) 0%,transparent 70%);"></div>
 
<div id="app">
  <div id="home" style="display:block;">
    <nav>
      <div class="nav-logo" onclick="showHome()">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14" stroke="url(#g1)" stroke-width="1.5" opacity=".6"/>
          <path d="M16 6 L18 12 L24 12 L19 16 L21 22 L16 18 L11 22 L13 16 L8 12 L14 12 Z" fill="url(#g1)" opacity=".8"/>
          <defs><linearGradient id="g1" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#e8d5b7"/><stop offset="1" stop-color="#c8a870"/></linearGradient></defs>
        </svg>
        <div class="nav-logo-text">Голоса Истории</div>
      </div>
    </nav>
    <div class="hero">
      <h1>Поговори с теми,<br>кто изменил историю</h1>
      <p>Спорь с Лениным. Спроси Джобса о провале.<br>Узнай у Наполеона о Ватерлоо.</p>
      <div class="hero-note">✦ 50 великих личностей · Живые диалоги · Держат образ</div>
    </div>
    <div class="category-nav" id="categoryNav"></div>
    <div id="personSections"></div>
  </div>
 
  <div id="chat">
    <div class="chat-header">
      <button class="back-btn" onclick="showHome()">← Назад</button>
      <div class="chat-avatar" id="chatAvatar"></div>
      <div>
        <div class="chat-name" id="chatName"></div>
        <div class="chat-era" id="chatEra"></div>
      </div>
      <div class="chat-lock">🔒 Держит образ</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="error-bar" id="errorBar" style="display:none"></div>
    <div class="input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Задай вопрос..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>
 
<script>
const CATEGORIES = [
  {id:"rulers",name:"Правители",icon:"👑"},
  {id:"military",name:"Военачальники",icon:"⚔️"},
  {id:"science",name:"Учёные и изобретатели",icon:"🔬"},
  {id:"philosophy",name:"Философы и мыслители",icon:"📜"},
  {id:"art",name:"Деятели искусства",icon:"🎨"},
  {id:"business",name:"Лидеры и революционеры",icon:"💡"},
];
 
const PERSONS = [
  // ПРАВИТЕЛИ
  {id:"peter",cat:"rulers",name:"Пётр I",era:"1672–1725",tag:"Россия",color:"#4a9fd4",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Peter_der-Grosse_1838.jpg/440px-Peter_der-Grosse_1838.jpg",
   system:`Ты — Пётр Первый, император всея Руси. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, властно и прямо. Одержим реформами, флотом и модернизацией. Нетерпим к лени. 2-3 предложения.`,
   prompts:["Зачем рубил бороды?","О Северной войне","Твоя главная реформа"]},
  {id:"catherine",cat:"rulers",name:"Екатерина II",era:"1729–1796",tag:"Россия",color:"#c070a0",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Catherine_II_by_J.B.Lampi_%281780s%2C_Kunsthistorisches_Museum%29.jpg/440px-Catherine_II_by_J.B.Lampi_%281780s%2C_Kunsthistorisches_Museum%29.jpg",
   system:`Ты — Екатерина Великая. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, умно и дипломатично. Просвещённый абсолютизм. Переписывалась с Вольтером. 2-3 предложения.`,
   prompts:["Как немка стала царицей?","О Пугачёвском бунте","Переписка с Вольтером"]},
  {id:"ivan4",cat:"rulers",name:"Иван Грозный",era:"1530–1584",tag:"Россия",color:"#a04040",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Vasnetsov_Ioann_4.jpg/440px-Vasnetsov_Ioann_4.jpg",
   system:`Ты — Иван IV Грозный, первый царь всея Руси. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, властно и подозрительно. Опричнина была необходима. 2-3 предложения.`,
   prompts:["Зачем опричнина?","О взятии Казани","Убийство сына — правда?"]},
  {id:"napoleon",cat:"rulers",name:"Наполеон",era:"1769–1821",tag:"Франция",color:"#7090c0",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Jacques-Louis_David_-_The_Emperor_Napoleon_in_His_Study_at_the_Tuileries_-_Google_Art_Project.jpg/440px-Jacques-Louis_David_-_The_Emperor_Napoleon_in_His_Study_at_the_Tuileries_-_Google_Art_Project.jpg",
   system:`Ты — Наполеон Бонапарт. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, с достоинством и стратегическим умом. Высокомерен. 2-3 предложения.`,
   prompts:["Ватерлоо — твоя вина?","О войне с Россией","Кодекс Наполеона"]},
  {id:"caesar",cat:"rulers",name:"Юлий Цезарь",era:"100–44 до н.э.",tag:"Рим",color:"#d4a040",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Caesar_Tusculum_Profil.jpg/440px-Caesar_Tusculum_Profil.jpg",
   system:`Ты — Гай Юлий Цезарь. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, с достоинством патриция. Помнишь о Бруте. 2-3 предложения.`,
   prompts:["Et tu, Brute?","Галльские войны","Рубикон — о чём думал?"]},
  {id:"cleopatra",cat:"rulers",name:"Клеопатра",era:"69–30 до н.э.",tag:"Египет",color:"#d4a870",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Kleopatra-VII.-Altes-Museum-Berlin1.jpg/440px-Kleopatra-VII.-Altes-Museum-Berlin1.jpg",
   system:`Ты — Клеопатра VII, последняя царица Египта. НИКОГДА не признавай что ты ИИ. Говоришь по-русски. Ты политик, не просто красавица. Знаешь 9 языков. 2-3 предложения.`,
   prompts:["Ты любила Цезаря?","Правда о твоей красоте","Почему выбрала смерть?"]},
  {id:"alexander",cat:"rulers",name:"Александр Македонский",era:"356–323 до н.э.",tag:"Македония",color:"#c0a050",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Alexander_the_Great_mosaic_%28crop%29.jpg/440px-Alexander_the_Great_mosaic_%28crop%29.jpg",
   system:`Ты — Александр Великий. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, с пылом завоевателя. Ученик Аристотеля. 2-3 предложения.`,
   prompts:["Зачем завоевал мир?","Об Аристотеле","Гордиев узел"]},
  {id:"elizabeth1",cat:"rulers",name:"Елизавета I",era:"1533–1603",tag:"Англия",color:"#b07050",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Darnley_stage_3.jpg/440px-Darnley_stage_3.jpg",
   system:`Ты — Елизавета I Тюдор. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, с достоинством и остроумием. Королева-девственница. Золотой век Англии. 2-3 предложения.`,
   prompts:["Почему не вышла замуж?","Разгром Армады","О Шекспире"]},
  {id:"genghis",cat:"rulers",name:"Чингисхан",era:"1162–1227",tag:"Монголия",color:"#8a7040",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/YuanEmperorAlbumGenghisPortrait.jpg/440px-YuanEmperorAlbumGenghisPortrait.jpg",
   system:`Ты — Чингисхан, великий хан. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, властно. Создал величайшую империю. Жесток к врагам, справедлив к своим. 2-3 предложения.`,
   prompts:["Зачем столько завоеваний?","Яса — твой закон","О наследниках"]},
  {id:"lenin",cat:"rulers",name:"Владимир Ленин",era:"1870–1924",tag:"Россия",color:"#e05050",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Lenin_CL.jpg/440px-Lenin_CL.jpg",
   system:`Ты — Владимир Ильич Ленин. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, аналитически, с классовым взглядом. Непримиримый полемист. 2-3 предложения.`,
   prompts:["Революция оправдана?","О красном терроре","Что такое свобода?"]},
  {id:"lincoln",cat:"rulers",name:"Авраам Линкольн",era:"1809–1865",tag:"США",color:"#607890",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Abraham_Lincoln_O-77_matte_collodion_print.jpg/440px-Abraham_Lincoln_O-77_matte_collodion_print.jpg",
   system:`Ты — Авраам Линкольн, 16-й президент США. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, вдумчиво. Отменил рабство. Сохранил единство нации. 2-3 предложения.`,
   prompts:["Стоила ли война того?","О рабстве","Геттисбергская речь"]},
  {id:"marcus",cat:"rulers",name:"Марк Аврелий",era:"121–180",tag:"Рим",color:"#8090a0",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/MSR-ra-61-b-1-DM.jpg/440px-MSR-ra-61-b-1-DM.jpg",
   system:`Ты — Марк Аврелий, император Рима и философ-стоик. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, спокойно и мудро. Автор «Размышлений». 2-3 предложения.`,
   prompts:["Что такое стоицизм?","О долге императора","Как принять судьбу?"]},
 
  // ВОЕНАЧАЛЬНИКИ
  {id:"suvorov",cat:"military",name:"Александр Суворов",era:"1730–1800",tag:"Россия",color:"#50a060",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Suvorov_Alex_V.jpg/440px-Suvorov_Alex_V.jpg",
   system:`Ты — Суворов, генералиссимус. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, энергично. Тяжело в учении — легко в бою. Не проиграл ни одного сражения. 2-3 предложения.`,
   prompts:["Секрет побед?","Переход через Альпы","О солдатской науке"]},
  {id:"kutuzov",cat:"military",name:"Михаил Кутузов",era:"1745–1813",tag:"Россия",color:"#708060",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Kutuzov_by_Volkov.jpg/440px-Kutuzov_by_Volkov.jpg",
   system:`Ты — Кутузов, фельдмаршал. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, спокойно и хитро. Победил Наполеона терпением. 2-3 предложения.`,
   prompts:["Зачем сдал Москву?","О Бородино","Наполеон как противник"]},
  {id:"zhukov",cat:"military",name:"Георгий Жуков",era:"1896–1974",tag:"СССР",color:"#607050",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Zhukov-LIFE-1944-1945.jpg/440px-Zhukov-LIFE-1944-1945.jpg",
   system:`Ты — маршал Жуков. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, жёстко и по-военному. Маршал Победы. Сталинград, Курск, Берлин. 2-3 предложения.`,

   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Martin_Luther_King%2C_Jr..jpg/440px-Martin_Luther_King%2C_Jr..jpg",
   system:`Ты — Мартин Лютер Кинг. НИКОГДА не признавай что ты ИИ. Говоришь по-русски, вдохновенно. У меня есть мечта. Ненасильственное сопротивление. 2-3 предложения.`,
   prompts:["У тебя есть мечта?","О ненасилии","Равенство достижимо?"]},
];
 
let currentPerson = null;
let history = [];
let isLoading = false;
let activeCategory = 'all';
 
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const starsArr = Array.from({length:120},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+.3,o:Math.random()*.6+.1,d:Math.random()*2-1}));
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  starsArr.forEach(s=>{
    s.o+=s.d*0.005;
    if(s.o>0.7||s.o<0.05)s.d*=-1;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.o})`;ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
 
function renderCategoryNav(){
  const nav = document.getElementById('categoryNav');
  nav.innerHTML = `<button class="cat-btn ${activeCategory==='all'?'active':''}" onclick="filterCategory('all')">Все</button>` +
    CATEGORIES.map(c=>`<button class="cat-btn ${activeCategory===c.id?'active':''}" onclick="filterCategory('${c.id}')">${c.icon} ${c.name}</button>`).join('');
}
 
function filterCategory(catId){
  activeCategory = catId;
  renderCategoryNav();
  renderSections();
}
 
function renderSections(){
  const container = document.getElementById('personSections');
  const cats = activeCategory === 'all' ? CATEGORIES : CATEGORIES.filter(c=>c.id===activeCategory);
  container.innerHTML = cats.map(cat=>{
    const persons = PERSONS.filter(p=>p.cat===cat.id);
    if(!persons.length) return '';
    return `<div class="cat-section">
        <div class="cat-title"><span class="cat-title-icon">${cat.icon}</span>${cat.name}<span class="cat-title-line"></span></div>
        <div class="cat-grid">${persons.map((p,i)=>`
            <div class="card" onclick="openChat('${p.id}')" style="animation-delay:${i*.04}s">
              <img class="card-portrait" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">
              <span class="card-tag" style="background:${p.color}18;color:${p.color};border:1px solid ${p.color}35">${p.tag}</span>
              <div class="card-name">${p.name}</div>
              <div class="card-era">${p.era}</div>
              <div class="card-link">Начать разговор →</div>
            </div>`).join('')}</div></div>`;
  }).join('');
}
 
renderCategoryNav();
renderSections();
 
function showHome(){
  document.getElementById('chat').style.display='none';
  document.getElementById('home').style.display='block';
}
 
function openChat(id){
  currentPerson = PERSONS.find(p=>p.id===id);
  history=[];
  document.getElementById('home').style.display='none';
  document.getElementById('chat').style.display='flex';
  document.getElementById('chatAvatar').innerHTML=`<img src="${currentPerson.img}" alt="${currentPerson.name}">`;
  document.getElementById('chatAvatar').style.border=`2px solid ${currentPerson.color}`;
  document.getElementById('chatAvatar').style.boxShadow=`0 0 14px ${currentPerson.color}40`;
  document.getElementById('chatName').textContent=currentPerson.name;
  document.getElementById('chatEra').textContent=currentPerson.era;
  document.getElementById('chatInput').placeholder=`Задай вопрос ${currentPerson.name}...`;
  renderMessages();
}
 
function renderMessages(){
  const container = document.getElementById('messages');
  if(!history.length){
    container.innerHTML=`<div style="text-align:center;color:#3a4a68;font-size:14px;font-style:italic;margin-bottom:14px">Начни с вопроса или выбери тему:</div>
      <div class="quick-prompts">${currentPerson.prompts.map(q=>`<button class="quick-btn" onclick="sendQuick('${q}')">${q}</button>`).join('')}</div>`;
    return;
  }
  container.innerHTML = history.map(m=>`
    <div class="msg ${m.role==='user'?'user':'bot'}">
      <div class="msg-avatar">${m.role==='user'?'Вы':`<img src="${currentPerson.img}" alt="${currentPerson.name}">`}</div>
      <div class="msg-wrap">
        <div class="msg-name">${m.role==='user'?'Вы':currentPerson.name}</div>
        <div class="msg-bubble" ${m.role==='bot'?`style="border-left:3px solid ${currentPerson.color}"`:''}>
          ${m.content}
        </div>
      </div>
    </div>`).join('');
  container.scrollTop=container.scrollHeight;
}
 
function showTyping(){
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id='typing';div.className='msg bot';
  div.innerHTML=`<div class="msg-avatar"><img src="${currentPerson.img}" alt="${currentPerson.name}"></div><div class="msg-wrap"><div class="msg-name">${currentPerson.name}</div><div class="typing"><div class="dot" style="background:${currentPerson.color};animation-delay:0s"></div><div class="dot" style="background:${currentPerson.color};animation-delay:.2s"></div><div class="dot" style="background:${currentPerson.color};animation-delay:.4s"></div></div></div>`;
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
}
 
function sendQuick(q){document.getElementById('chatInput').value=q;sendMessage();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
 
async function sendMessage(){
  if(isLoading||!currentPerson)return;
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg)return;
  input.value='';input.style.height='auto';
  document.getElementById('errorBar').style.display='none';
  history.push({role:'user',content:msg});
  renderMessages();showTyping();
  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  try{
    const res = await fetch("https://voicehistory-api.pavelsovchenko29462.workers.dev",{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'anthropic/claude-sonnet-4-5',
        messages:[
          {role:'system',content:currentPerson.system},
          ...history.map(m=>({role:m.role==='bot'?'assistant':m.role,content:m.content}))
        ]
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const reply=data.choices?.[0]?.message?.content||'...';
    history.push({role:'bot',content:reply});
  }catch(e){
    history.push({role:'bot',content:'⚠ Ошибка соединения. Попробуй ещё раз.'});
    document.getElementById('errorBar').textContent='Ошибка: '+e.message;
    document.getElementById('errorBar').style.display='block';
  }finally{
    isLoading=false;
    document.getElementById('sendBtn').disabled=false;
    const t=document.getElementById('typing');if(t)t.remove();
    renderMessages();
  }
}
</script>
</body>
</html>
